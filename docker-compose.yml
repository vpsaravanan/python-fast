  # Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=pythonuser
      - POSTGRES_PASSWORD=pythonpass
      - POSTGRES_DB=pythondb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
